<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Demo</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 50px;
        }

        p {
            font-size: 20px;
        }

        .box {
            margin: 30px auto;
            padding: 20px;
            width: 300px;
            border-radius: 10px;
            background: rgba(0,0,0,0.2);
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background: #ff9800;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #e68900;
        }
    </style>
</head>

<body>

<div class="container">
    <h1> Hello from Docker</h1>
    <p>This page is running inside a Docker container</p>

    <div class="box">
        <p><strong>Project:</strong> CBAD Lab 6</p>
        <p><strong>Port:</strong> 8080</p>
        <p><strong>Server:</strong> Nginx</p>
    </div>

    <button onclick="showMessage()">Click Me</button>
    <p id="msg"></p>
</div>

<script>
    function showMessage() {
        document.getElementById("msg").innerText = "🎉 Docker is working perfectly!";
    }
</script>

</body>
</html>
